# 🛡️ Vision SaaS - NGINX Reverse Proxy Config
# Optimizes for High-Concurrency, Security, and Socket.io

server {
    listen 80;
    server_name api.vision.edu; # Replace with your domain

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security Headers (NGINX Layer redundancy)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # 🔥 Primary API Proxy
    location / {
        proxy_pass http://api:5001; # Matches docker-compose service name
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for heavy AI/Reports tasks
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ⚡ Socket.io Optimized Proxy
    location /socket.io/ {
        proxy_pass http://api:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.io specific
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # 🩺 Health Checks (Direct bypass if needed)
    location /health {
        proxy_pass http://api:5001/health;
        access_log off;
    }
}
