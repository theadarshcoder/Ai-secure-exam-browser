<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>VISION Secure Browser</title>
    <meta name="description" content="The world's most advanced secure environment framework for elite institutional assessments. Absolute Integrity. Zero Compromise." />
    
    <!-- Theme Init: apply data-theme BEFORE first paint to prevent white flash -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('vision_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', stored);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vision.ai/" />
    <meta property="og:title" content="VISION Secure Browser" />
    <meta property="og:description" content="The world's most advanced secure environment for elite assessments." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://vision.ai/" />
    <meta property="twitter:title" content="VISION Secure Browser" />
    <meta property="twitter:description" content="The world's most advanced secure environment for elite assessments." />
    <meta property="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
