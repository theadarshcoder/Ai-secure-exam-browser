    <!-- Theme Init: apply data-theme BEFORE first paint to prevent white flash -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('vision_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', stored);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
